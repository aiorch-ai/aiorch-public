<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to AIORCH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: #0c0c10;
    --border: #1e1e28;
    --green: #00ff87;
    --green-dim: rgba(0,255,135,0.12);
    --text: #efefef;
    --muted: #5a5a70;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .check {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--green-dim);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 32px;
  }
  .key-box {
    background: var(--bg);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    position: relative;
  }
  .key-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .key-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 2px;
    word-break: break-all;
    user-select: all;
  }
  .copy-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--green-dim);
    border: 1px solid rgba(0,255,135,0.2);
    color: var(--green);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }
  .copy-btn:hover { background: rgba(0,255,135,0.2); }
  .steps {
    text-align: left;
    margin-bottom: 32px;
  }
  .steps h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
    color: var(--muted);
  }
  .step {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .step-num {
    background: var(--green-dim);
    color: var(--green);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .step code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--green);
  }
  .plan-badge {
    display: inline-block;
    background: var(--green-dim);
    color: var(--green);
    font-size: 12px;
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 24px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .loading {
    color: var(--muted);
    font-size: 15px;
    padding: 40px 0;
  }
  .loading .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    color: #ff4d4d;
    font-size: 14px;
    padding: 20px 0;
  }
  .home-link {
    display: inline-block;
    color: var(--muted);
    font-size: 13px;
    margin-top: 16px;
    text-decoration: none;
  }
  .home-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="loading" id="loading">
    <span class="spinner"></span>
    Processing your order...
  </div>
</div>

<script>
const LICENSE_API = 'https://license.aiorch.ai';

function getParam(name) {
  const url = new URLSearchParams(window.location.search);
  return url.get(name) || '';
}

function showKey(data) {
  document.getElementById('card').innerHTML = `
    <div class="check">✓</div>
    <h1>You're in.</h1>
    <p class="subtitle">Your license is active. Here's your key — save it somewhere safe.</p>
    <div class="plan-badge">${data.plan} plan</div>
    <div class="key-box">
      <div class="key-label">Your License Key</div>
      <div class="key-value" id="key-text">${data.key}</div>
      <button class="copy-btn" onclick="copyKey()">Copy</button>
    </div>
    <div class="steps">
      <h3>Get started in 3 steps:</h3>
      <div class="step">
        <span class="step-num">1</span>
        <span>Install: <code>curl -fsSL aiorch.ai/install.sh | bash</code></span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span>Add your key to <code>.env</code>: <code>ORCH_LICENSE_KEY=${data.key}</code></span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span>Open <code>http://localhost:1230</code> and create your first session</span>
      </div>
    </div>
    <p style="color:var(--muted);font-size:13px;">A copy has also been sent to <strong>${data.email}</strong></p>
    <a href="/" class="home-link">← Back to aiorch.ai</a>
  `;
}

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <div class="error">${msg}</div>
    <p style="color:var(--muted);font-size:13px;margin-top:16px;">
      If this persists, contact <a href="mailto:support@aiorch.ai" style="color:var(--green)">support@aiorch.ai</a>
    </p>
    <a href="/" class="home-link">← Back to aiorch.ai</a>
  `;
}

async function fetchKey() {
  const orderId = getParam('order_id') || getParam('order');
  const subId = getParam('subscription_id') || getParam('sub');

  if (!orderId && !subId) {
    showError('No order information found. Please check your email for your license key.');
    return;
  }

  const param = orderId ? `order_id=${orderId}` : `subscription_id=${subId}`;
  let attempts = 0;
  const maxAttempts = 12; // 12 x 2.5s = 30 seconds

  while (attempts < maxAttempts) {
    try {
      const resp = await fetch(`${LICENSE_API}/api/v1/license/lookup?${param}`);
      if (resp.ok) {
        const data = await resp.json();
        if (data.status === 'found') {
          showKey(data);
          return;
        }
      }
    } catch (e) {
      // Network error — retry
    }
    attempts++;
    await new Promise(r => setTimeout(r, 2500));
  }

  showError('Your payment was received but your license key is still being generated. Please refresh this page in a moment, or check your email.');
}

fetchKey();

function copyKey() {
  const key = document.getElementById('key-text').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
}
</script>
</body>
</html>
